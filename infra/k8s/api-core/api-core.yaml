apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-core-deployment
  namespace: vulnix-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-core
  template:
    metadata:
      labels:
        app: api-core
    spec:
      containers:
      - name: api-container
        image: cenii/api-core:latest
        ports:
        - containerPort: 3000
        env:
        - name: MQ_PASS
          valueFrom:
            secretKeyRef:
              name: vulnix-passwords
              key: mq-password
        - name: RABBITMQ_URL
          value: "amqp://admin:$(MQ_PASS)@rabbitmq-service:5672"
---
apiVersion: v1
kind: Service
metadata:
  name: api-core-service
  namespace: vulnix-prod
spec:
  type: NodePort
  selector:
    app: api-core
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30081