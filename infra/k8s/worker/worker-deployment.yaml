apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnix-api-deployment
  namespace: vulnix-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vulnix-api
  template:
    metadata:
      labels:
        app: vulnix-api
    spec:
      containers:
        - name: api
          image: alvarogl05/vulnix-api:latest
          env:
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: vulnix-passwords
                  key: db-password
            - name: MQ_PASS
              valueFrom:
                secretKeyRef:
                  name: vulnix-passwords
                  key: mq-password
            - name: DATABASE_URL
              value: "postgresql://postgres:$(DB_PASS)@postgres-service:5432/vulnix"
            - name: RABBITMQ_URL
              value: "amqp://admin:$(MQ_PASS)@rabbitmq-service:5672"
            - name: RABBITMQ_QUEUE
              value: "scan_tasks"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: vulnix-prod
spec:
  type: NodePort
  selector:
    app: vulnix-api
  ports:
    - port: 80
      targetPort: 3000
      nodePort: 30080
